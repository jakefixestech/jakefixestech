          - { label: "Data 2 Name", name: "data2Name", widget: "string" }
          - { label: "Data 2 Price", name: "data2Price", widget: "string" }
          - { label: "Mac 1 Name", name: "mac1Name", widget: "string" }
          - { label: "Mac 1 Price", name: "mac1Price", widget: "string" }
          - { label: "Mac 2 Name", name: "mac2Name", widget: "string" }
          - { label: "Mac 2 Price", name: "mac2Price", widget: "string" }
          - { label: "Mac 3 Name", name: "mac3Name", widget: "string" }
          - { label: "Mac 3 Price", name: "mac3Price", widget: "string" }
          - { label: "Mac 4 Name", name: "mac4Name", widget: "string" }
          - { label: "Mac 4 Price", name: "mac4Price", widget: "string" }
          - { label: "Mac 5 Name", name: "mac5Name", widget: "string" }
          - { label: "Mac 5 Price", name: "mac5Price", widget: "string" }
          - { label: "Console 1 Name", name: "console1Name", widget: "string" }
          - { label: "Console 1 Price", name: "console1Price", widget: "string" }
          - { label: "Console 2 Name", name: "console2Name", widget: "string" }
          - { label: "Console 2 Price", name: "console2Price", widget: "string" }
          - { label: "Console 3 Name", name: "console3Name", widget: "string" }
          - { label: "Console 3 Price", name: "console3Price", widget: "string" }
          - { label: "Support 1 Name", name: "support1Name", widget: "string" }
