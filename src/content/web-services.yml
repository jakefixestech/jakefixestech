# ADA Card
adaTitle: "ADA & WCAG AA Compliant — Built Into Every Site"
adaDesc: "All websites I build follow WCAG AA accessibility guidelines, the standard required under the Americans with Disabilities Act. This means your site works for everyone, including users with visual, motor or cognitive disabilities. Accessible websites also rank better in Google. Every site I build scores a perfect 10/10 on WAVE and 100/100 on Lighthouse desktop — with mobile scores consistently hitting 398–400 out of 400. That's the bar I hold all my work to."

