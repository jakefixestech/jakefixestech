storyLabel: My Story
storyTitle: Tech Has Been My Thing Since Day One
story1: Hi, I'm Jake Charland. I've been passionate about technology since I was
  a kid. Taking things apart, figuring out how they work and putting them back
  together is something I've always loved. What started as a hobby turned into a
  career spanning over a decade of real hands-on experience in IT, computer
  repair and web development.
story2: I hold a Bachelor's Degree in Computer Information Systems from Lyndon
  State College in Vermont. I also had the opportunity to teach a senior level
  advanced website programming course there twice. That experience gave me a
  deep appreciation for breaking down complex tech concepts into something
  anyone can understand.
story3: Over the years I've worked in IT across multiple Vermont schools and
  colleges, supporting students, staff and entire organizations with their
  technology needs. I also single-handedly set up all of the technology
  infrastructure for the Do North Coworking Space in Lyndonville, VT during my
  final semester of college. That included everything from networking to
  workstations, built from scratch.
story4: "I recently launched Jake Fixes Tech LLC right here in Littleton, NH to
  bring affordable, honest tech repair and professional web design to this
  community. Homes, families and small businesses across the North Country
  deserve tech support they can actually trust. I moved here to Littleton Jan
  1st 2026, with my wife and three kids. I have a lot of family that migrated
  from Vermont to New Hampshire many years ago and they talked me into moving to
  this wonderful state. I hope to serve the Littleton community as best as I can
  and nearby communities and towns within a 30 square mile radius of Littleton
  NH, as a computer Technician. As a web designer? I'm ready to work with
  anyone, anywhere. "
story5: "When your tech isn't working I know how stressful that can be. I'm here
  to make the process as smooth and painless as possible. No upselling, no
  confusing jargon, just honest work at a fair price. And my Web design prices
  are listed right on my web design page, I'm as open as a book with my
  services, welcome! "
